<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Doodle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#1a1a2e;overflow:hidden;font-family:sans-serif}
#toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#16213e;border-bottom:1px solid #0f3460}
#colorBtn{width:30px;height:30px;border-radius:50%;border:3px solid #fff;cursor:pointer;background:#1a1a1a}
#sizeLabel{color:#eee;font-size:13px;min-width:40px}
#viewers{margin-left:auto;color:#aaa;font-size:12px}
#status{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:#0f3460cc;color:#eee;padding:4px 12px;border-radius:20px;font-size:12px;pointer-events:none;transition:opacity .5s}
#status.hidden{opacity:0}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<div id="toolbar">
  <div id="colorBtn"></div>
  <span id="sizeLabel">10px</span>
  <span id="viewers">👁 0</span>
</div>
<div id="status" class="hidden"></div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const colorBtn = document.getElementById('colorBtn');
const sizeLabel = document.getElementById('sizeLabel');
const viewersEl = document.getElementById('viewers');
const statusEl = document.getElementById('status');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight - 50;
  redraw();
}
window.addEventListener('resize', resize);

// State
let strokes = [];
let currentColor = '#1a1a1a';
let currentSize = 10;
let drawing = false;
let pts = [];

colorBtn.style.background = currentColor;

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.classList.remove('hidden');
  clearTimeout(statusEl._t);
  statusEl._t = setTimeout(() => statusEl.classList.add('hidden'), 2000);
}

// Drawing
function drawStroke(s) {
  if (!s.points || s.points.length < 2) return;
  ctx.beginPath();
  ctx.strokeStyle = s.color;
  ctx.lineWidth = s.size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.moveTo(s.points[0].x * W / 1000, s.points[0].y * H / 1000);
  for (let i = 1; i < s.points.length; i++)
    ctx.lineTo(s.points[i].x * W / 1000, s.points[i].y * H / 1000);
  ctx.stroke();
}

function redraw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  for (const s of strokes) drawStroke(s);
}

// User drawing (sends to server)
function toCoord(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: Math.round((src.clientX - r.left) / W * 1000),
    y: Math.round((src.clientY - r.top) / H * 1000)
  };
}

canvas.addEventListener('mousedown', e => { drawing = true; pts = [toCoord(e)]; });
canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  pts.push(toCoord(e));
  // live preview
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
  for (const s of strokes) drawStroke(s);
  drawStroke({ color: currentColor, size: currentSize, points: pts });
});
canvas.addEventListener('mouseup', finishStroke);
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; pts = [toCoord(e)]; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; pts.push(toCoord(e)); ctx.clearRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); for(const s of strokes) drawStroke(s); drawStroke({color:currentColor,size:currentSize,points:pts}); });
canvas.addEventListener('touchend', finishStroke);

function finishStroke() {
  if (!drawing || pts.length < 2) { drawing = false; return; }
  drawing = false;
  const s = { color: currentColor, size: currentSize, points: pts };
  strokes.push(s);
  redraw();
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: 'user_stroke', ...s }));
  pts = [];
}

// WebSocket
let ws, reconnectTimer;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => { showStatus('🟢 Connected'); };

  ws.onmessage = (e) => {
    const m = JSON.parse(e.data);
    switch (m.type) {
      case 'init':
        strokes = m.strokes || [];
        currentColor = m.color || '#1a1a1a';
        currentSize = m.size || 10;
        colorBtn.style.background = currentColor;
        sizeLabel.textContent = currentSize + 'px';
        viewersEl.textContent = '👁 ' + (m.viewers || 0);
        redraw();
        break;
      case 'stroke_end':
        strokes.push({ color: m.color, size: m.size, points: m.points });
        drawStroke({ color: m.color, size: m.size, points: m.points });
        break;
      case 'clear':
        strokes = [];
        redraw();
        showStatus('🗑 Canvas cleared');
        break;
      case 'color':
        currentColor = m.hex;
        colorBtn.style.background = m.hex;
        showStatus('🎨 Color: ' + m.hex);
        break;
      case 'size':
        currentSize = m.px;
        sizeLabel.textContent = m.px + 'px';
        showStatus('📏 Size: ' + m.px + 'px');
        break;
      case 'undo':
        strokes = m.strokes || [];
        redraw();
        showStatus('↩️ Undone');
        break;
      case 'viewers':
        viewersEl.textContent = '👁 ' + m.count;
        break;
    }
  };

  ws.onclose = () => {
    showStatus('🔴 Disconnected, reconnecting...');
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };
}

resize();
connect();
</script>
</body>
</html>
