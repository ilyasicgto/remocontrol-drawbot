<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Doodle Gator!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#282e33;--sec:#313b43;--accent:#cc905c;--accent-t:#ecbb90;
  --text:#f5f5f5;--hint:#82868a;--dest:#f57474;--sep:rgba(255,255,255,0.07);
  --btn-r:35%;--BTN:49px;--bdr:1.6px solid #cc905c;--btn-bg:rgba(40,46,51,0.1)
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);user-select:none}

/* ── TOP BAR ── */
#topbar{position:fixed;top:0;left:0;right:0;height:38px;display:flex;
  align-items:center;justify-content:center;z-index:50;pointer-events:none}
#confirm-btn{position:absolute;left:15px;color:var(--text);opacity:.75;
  font-size:15px;cursor:pointer;pointer-events:auto;padding:2px 6px;border-radius:8px}
#word{font-size:22px;color:var(--text);cursor:pointer;pointer-events:auto;
  max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── BOARD ── */
#board{position:fixed;inset:0;z-index:10}
#canvas-pos{position:absolute;left:50%;transform:translateX(-50%)}
#mainCanvas{position:absolute;background:#fff;box-shadow:rgba(0,0,0,.25) 0 3px 12px}
#tempCanvas{position:absolute;cursor:crosshair;touch-action:none}

/* ── CONTROLS (2 rows below canvas) ── */
#controls{position:absolute;left:0;right:0;z-index:40}
.ctrl-frame{display:flex;flex-direction:column;align-items:center;padding:7px 10px 3px}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;width:100%;height:52px;position:relative}

/* circle-switch — exact from debug: 49x49, border-radius 35%, border 1.6px #cc905c */
.cs{width:var(--BTN);height:var(--BTN);border-radius:var(--btn-r);border:var(--bdr);
  background:var(--btn-bg);display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;color:var(--accent);flex-shrink:0;
  transition:background .12s,color .12s}
.cs.active{background:var(--accent);color:#fff}
.cs svg{width:24px;height:24px;flex-shrink:0}
/* menu dot — 17x2.2px top-right orange bar (from debug) */
.cs.dot::after{content:'';position:absolute;top:4px;right:4px;
  width:17px;height:2.2px;background:var(--accent);border-radius:1.5px}
.cs.active.dot::after{background:#fff}

/* color-ball (5th in row1) */
#colorBall{width:var(--BTN);height:var(--BTN);border-radius:var(--btn-r);border:var(--bdr);
  background:var(--btn-bg);display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0}
#colorInner{width:35px;height:35px;border-radius:50%;
  box-shadow:rgba(128,128,128,1) 0 0 0 0.4px,rgba(0,0,0,1) 0 0 0 0.4px}

/* size-ball (5th in row2) */
#sizeBall{width:var(--BTN);height:var(--BTN);border-radius:var(--btn-r);border:var(--bdr);
  background:var(--btn-bg);display:flex;align-items:center;justify-content:center;
  cursor:ns-resize;flex-shrink:0;position:relative}
#sizeInner{border-radius:50%;display:flex;align-items:center;justify-content:center;
  transition:width .1s,height .1s;box-shadow:rgba(128,128,128,1) 0 0 0 0.4px,rgba(0,0,0,1) 0 0 0 0.4px}
#sizeLbl{position:absolute;color:#eee;font-size:8px;opacity:.85;pointer-events:none}
/* brush-info: right of row2 */
#brushInfo{position:absolute;right:0;top:0;height:100%;display:flex;flex-direction:column;
  justify-content:center;align-items:flex-end;padding-right:4px;
  color:var(--hint);font-size:12px;line-height:1.3;pointer-events:none;min-width:44px}

/* ── VERTICAL WIDTH SLIDER (left of canvas, class=widthSlider) ── */
/* Real game: vertical range input at x=495,y=473,w=25,h=177 */
#widthSliderWrap{position:absolute;display:flex;align-items:center;justify-content:center;
  z-index:30;display:none}
#widthSliderWrap.show{display:flex}
#widthSlider{
  -webkit-appearance:slider-vertical;appearance:slider-vertical;
  writing-mode:vertical-lr;direction:rtl;
  width:25px;height:177px;
  accent-color:var(--accent);cursor:pointer;
  background:var(--sec);border-radius:4px;
}
/* fallback for browsers that don't support vertical */
@supports not (appearance: slider-vertical){
  #widthSlider{
    writing-mode:vertical-lr;direction:rtl;
    -webkit-appearance:none;
    width:177px;height:25px;
    transform:rotate(180deg);
  }
}

/* ── COLOR PALETTE (overlaid on canvas, class=color-palette) ── */
/* Real: rect=(540,459,200,232) — right-center of canvas */
#colorPalette{position:absolute;z-index:35;display:none;flex-direction:column;
  background:rgba(40,46,51,0.95);border-radius:10px;padding:10px;
  box-shadow:0 4px 20px rgba(0,0,0,.5)}
#colorPalette.show{display:flex}

/* react-colorful style HSV picker */
.hue-picker{position:relative;width:180px;height:120px;border-radius:6px;
  overflow:hidden;cursor:crosshair;margin-bottom:8px}
.hue-picker canvas{width:100%;height:100%}
.hue-pointer{position:absolute;width:16px;height:16px;border-radius:50%;
  border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5);
  transform:translate(-50%,-50%);pointer-events:none}
.hue-strip{position:relative;width:180px;height:12px;border-radius:6px;
  background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);
  cursor:pointer;margin-bottom:8px}
.hue-strip-ptr{position:absolute;top:-3px;width:18px;height:18px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.5);transform:translateX(-50%);
  pointer-events:none}
.alpha-strip{position:relative;width:180px;height:12px;border-radius:6px;
  cursor:pointer;margin-bottom:10px}
.alpha-strip-ptr{position:absolute;top:-3px;width:18px;height:18px;border-radius:50%;
  background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.5);transform:translateX(-50%);
  pointer-events:none}

/* hex input (class=colorful-input input-field) */
#hexInput{width:100%;background:rgba(185,185,185,0.11);border:1px solid rgba(204,144,92,.4);
  color:var(--text);border-radius:6px;padding:5px 8px;font-size:13px;outline:none;
  font-family:monospace;margin-bottom:8px}

/* small swatch columns (right side: 2 cols × 5 rows, 30x30 each) */
.swatch-cols{display:flex;gap:4px;margin-bottom:6px}
.swatch-col{display:flex;flex-direction:column;gap:4px}
.sw{width:30px;height:30px;border-radius:50%;cursor:pointer;flex-shrink:0;
  border:2px solid transparent;transition:transform .1s}
.sw:active{transform:scale(.88)}
.sw.sel{border-color:#fff}

/* bottom-controls row (saved-add-color + premium switch) */
.pal-bottom{display:flex;gap:4px;align-items:center}
.saved-add{width:30px;height:30px;border-radius:50%;background:rgba(187,187,187,.4);
  border:none;color:var(--hint);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.saved-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2px solid transparent}
.saved-dot:active{transform:scale(.88)}

/* gradient-color-switch */
.grad-switch{width:69px;height:25px;border-radius:4px;background:linear-gradient(to right,#cc905c,#f0c080);
  border:none;cursor:pointer;border-radius:12px;font-size:10px;color:#fff;padding:0 6px}

/* ── BRUSH LIST OVERLAY (full-screen, class=brush-option-row) ── */
/* Real: brush rows at x=513,w=255. Brush list opens as a panel covering the canvas area */
#brushOverlay{position:fixed;inset:0;z-index:200;display:none;background:var(--bg)}
#brushOverlay.show{display:flex;flex-direction:column}
.brush-menu-header{display:flex;align-items:center;height:37px;padding:0 14px;
  background:var(--sec);border-bottom:1px solid var(--sep);flex-shrink:0}
.brush-menu-back{background:none;border:none;color:var(--accent);cursor:pointer;
  font-size:20px;padding:0 8px 0 0}
.brush-menu-title{flex:1;font-size:16px;font-weight:600;color:var(--text);text-align:center}
.brush-menu-close{background:none;border:none;color:var(--hint);cursor:pointer;font-size:20px}
#brushListScroll{flex:1;overflow-y:auto}
#brushListScroll::-webkit-scrollbar{width:3px}
#brushListScroll::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
/* brush-option-row: 255x41 */
.brow{display:flex;align-items:center;height:41px;padding:0 14px;cursor:pointer;
  border-bottom:1px solid rgba(138,138,138,0.07);transition:background .1s}
.brow.active{background:var(--accent)}
.brow:not(.active):hover{background:rgba(204,144,92,.12)}
.brow-icon{width:35px;height:25px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-right:8px;color:var(--accent-t)}
.brow.active .brow-icon{color:#fff}
.brow-name{flex:1;font-size:14px;color:var(--text)}
.brow.active .brow-name{color:#fff}
.brow-drag{color:var(--hint);font-size:14px;opacity:.5}
/* brush-category-switcher: bottom row */
.brush-cats{display:flex;gap:6px;padding:8px 14px;background:var(--sec);
  border-top:1px solid var(--sep);flex-shrink:0;justify-content:center}
.cat-btn{padding:6px 20px;border-radius:17px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;transition:.12s}
.cat-btn.active{background:var(--accent);color:#fff}
.cat-btn:not(.active){background:var(--bg);color:var(--hint)}

/* ── LAYER MENU (slides from right, class=layer-menu) ── */
/* Real: rect=(971,611,296,199) in 1280px viewport → right-aligned */
#layerMenu{position:fixed;right:0;z-index:200;display:none;
  background:rgb(40,46,51);border-radius:10px 0 0 10px;
  min-width:260px;max-width:320px;box-shadow:-4px 0 20px rgba(0,0,0,.4)}
#layerMenu.show{display:block}
.layer-menu-header{display:flex;align-items:center;height:40px;padding:0 12px;
  border-bottom:1px solid var(--sep)}
.layer-menu-title{flex:1;font-size:15px;font-weight:600;color:var(--text)}
.layer-menu-buttons{display:flex;gap:4px;align-items:center}
.new-layer-btn{width:36px;height:36px;border-radius:8px;background:var(--accent);
  border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.new-layer-btn.danger{background:var(--dest)}
.new-layer-btn svg{width:16px;height:16px}
/* layer-list */
.layer-list{padding:4px 0}
/* layer-row: 284x46 */
.lrow{display:flex;align-items:center;height:46px;padding:0 8px;cursor:pointer;
  border-bottom:1px solid var(--sep);transition:background .1s}
.lrow.active{background:var(--accent)}
.drag-handle{color:var(--hint);font-size:14px;opacity:.5;margin-right:4px;cursor:grab}
.layer-thumbnail{width:36px;height:36px;border-radius:5px;background:#fff;
  flex-shrink:0;margin-right:8px;border:1px solid rgba(255,255,255,.1)}
.layer-row-column{flex:1}
.layer-row-main{font-size:13px;color:var(--text);font-weight:500}
.lrow.active .layer-row-main,.lrow.active .layer-metrics{color:#fff}
.layer-metrics{font-size:10px;color:var(--hint);margin-top:2px}
.layer-ctrl-btns{display:flex;gap:2px}
/* layer-control-button: 37x27 */
.lcb{width:34px;height:26px;border-radius:5px;background:rgba(255,255,255,.12);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}
.lcb svg{width:15px;height:15px}
/* settings-item rows */
.settings-item{display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-top:1px solid var(--sep);cursor:pointer}
.settings-label{flex:1;font-size:13px;color:var(--text)}
.settings-color-indicator{width:24px;height:24px;border-radius:50%;background:#fff;
  flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
/* native checkbox styled */
.settings-item input[type=checkbox]{accent-color:var(--accent);width:18px;height:18px;cursor:pointer}

/* ── WORD MENU (overlaid at x=521 area) ── */
/* Real: items at x=521,w=238-249. Opens centered/right of canvas */
#wordMenu{position:fixed;z-index:200;display:none;
  background:var(--sec);border-radius:10px;min-width:260px;
  box-shadow:0 4px 20px rgba(0,0,0,.5)}
#wordMenu.show{display:block}
.word-menu-header{display:flex;align-items:center;padding:12px 14px 8px;
  border-bottom:1px solid var(--sep)}
.word-menu-title{flex:1;font-size:16px;font-weight:600;color:var(--text)}
.word-menu-close{background:none;border:none;color:var(--hint);font-size:20px;cursor:pointer}
/* wide-button: 238x40, accent */
.wide-button{display:block;width:calc(100% - 28px);margin:10px 14px 6px;
  padding:10px;border-radius:10px;border:none;cursor:pointer;
  font-size:14px;font-weight:600;text-align:center}
.wide-button.accent{background:var(--accent);color:#fff}
/* hint buttons: 36x36 per letter */
.hints-section{padding:8px 14px}
.hints-title{color:var(--hint);font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.hints-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.hint-btn{min-width:36px;height:36px;padding:0 6px;border-radius:8px;border:none;
  cursor:pointer;font-size:14px;font-weight:700}
.hint-btn.active{background:var(--accent);color:#fff}
.hint-btn:not(.active){background:rgba(204,204,204,.22);color:var(--text)}
/* word-menu-item: 238x28-30, bg rgba(154,154,154,0.1) */
.word-menu-item,.drawing-menu-item{display:flex;align-items:center;gap:8px;
  padding:8px 14px;background:rgba(154,154,154,.1);border-bottom:1px solid var(--sep);cursor:pointer}
.word-menu-item label,.drawing-menu-item label{flex:1;font-size:13px;color:var(--text);cursor:pointer}
.word-menu-item-checkbox{accent-color:var(--accent);width:18px;height:18px;cursor:pointer}
/* gray-button: 238x41, bg=rgb(130,134,138) */
.gray-button{display:block;width:calc(100% - 28px);margin:6px 14px;
  padding:11px;border-radius:10px;border:none;cursor:pointer;
  font-size:14px;font-weight:600;background:rgb(130,134,138);color:#fff;text-align:center}

/* ── CLEAR DIALOG (modal) ── */
/* Real: cancel at (549,517), clear at (667,517), both 108x37 */
#clearDialog{position:fixed;inset:0;z-index:300;display:none;
  align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
#clearDialog.show{display:flex}
.clear-box{background:var(--sec);border-radius:14px;padding:22px 24px;text-align:center;min-width:240px}
.clear-box p{color:var(--text);margin-bottom:18px;font-size:15px}
.clear-btns{display:flex;gap:10px;justify-content:center}
/* message-popup-button: 108x37 */
.mpb{width:108px;height:37px;border-radius:10px;border:none;
  cursor:pointer;font-size:14px;font-weight:600}
.mpb.cancel-button{background:rgb(130,134,138);color:#fff}
.mpb.destructive-button{background:rgb(245,116,116);color:#fff}

/* ── TOAST ── */
#toast{position:fixed;top:44px;left:50%;transform:translateX(-50%);
  background:rgba(15,52,96,.9);color:#eee;padding:4px 16px;border-radius:20px;
  font-size:12px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:500;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span id="confirm-btn">✔️ 🖼</span>
  <span id="word">word ⚙️</span>
</div>

<!-- BOARD -->
<div id="board">
  <div id="canvas-pos">
    <canvas id="mainCanvas"></canvas>
    <canvas id="tempCanvas"></canvas>
  </div>

  <!-- Vertical width slider (left of canvas, shown when color picker open) -->
  <div id="widthSliderWrap">
    <input type="range" id="widthSlider" min="1" max="100" value="10" orient="vertical"/>
  </div>

  <!-- Color palette overlay (on canvas) -->
  <div id="colorPalette">
    <!-- HSV saturation/value box -->
    <canvas id="hsvCanvas" width="180" height="120" style="border-radius:6px;cursor:crosshair;display:block;margin-bottom:8px"></canvas>
    <!-- Hue strip -->
    <div class="hue-strip" id="hueStrip">
      <div class="hue-strip-ptr" id="huePtr"></div>
    </div>
    <!-- Alpha strip -->
    <div class="alpha-strip" id="alphaStrip">
      <div class="alpha-strip-ptr" id="alphaPtr"></div>
    </div>
    <!-- Hex input -->
    <input type="text" id="hexInput" placeholder="#000000" maxlength="9" spellcheck="false"/>
    <!-- Swatch columns + bottom controls in a row -->
    <div style="display:flex;gap:6px;align-items:flex-start">
      <div class="swatch-cols" id="swatchCols">
        <div class="swatch-col" id="swCol1"></div>
        <div class="swatch-col" id="swCol2"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <!-- bottom-controls: saved-add + premium -->
        <div class="pal-bottom" id="savedRow">
          <button class="saved-add" id="addSaved">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTROLS (2 rows) -->
  <div id="controls">
    <div class="ctrl-frame">
      <!-- Row 1: Brush Eraser Fill Eyedrop ColorBall -->
      <div class="ctrl-row">
        <div class="cs dot active" id="btnBrush">
          <svg viewBox="0 0 512 512" fill="currentColor"><path d="M481 31C445.1-4.8 386.9-4.8 351 31l-15 15L322.9 33C294.8 4.9 249.2 4.9 221.1 33L135 119c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0L255 66.9c9.4-9.4 24.6-9.4 33.9 0L302.1 80 186.3 195.7 316.3 325.7 481 161c35.9-35.9 35.9-94.1 0-129.9zM293.7 348.3L163.7 218.3 99.5 282.5c-48 48-80.8 109.2-94.1 175.8l-5 25c-1.6 7.9.9 16 6.6 21.7s13.8 8.1 21.7 6.6l25-5c66.6-13.3 127.8-46.1 175.8-94.1l64.2-64.2z"/></svg>
        </div>
        <div class="cs dot" id="btnEraser">
          <svg viewBox="0 0 512 512" fill="currentColor"><path d="M497.941 273.941c18.745-18.745 18.745-49.137 0-67.882l-160-160c-18.745-18.745-49.136-18.746-67.883 0l-256 256c-18.745 18.745-18.745 49.137 0 67.882l96 96A48.004 48.004 0 0 0 144 480h356c6.627 0 12-5.373 12-12v-40c0-6.627-5.373-12-12-12H355.883l142.058-142.059zm-302.627-62.627l137.373 137.373L265.373 416H150.628l-80-80 124.686-124.686z"/></svg>
        </div>
        <div class="cs" id="btnFill">
          <svg viewBox="0 0 576 512" fill="currentColor"><path d="M512 320s-64 92.65-64 128c0 35.35 28.66 64 64 64s64-28.65 64-64-64-128-64-128zm-9.37-102.94L294.94 9.37C288.69 3.12 280.5 0 272.31 0s-16.38 3.12-22.62 9.37l-81.58 81.58L81.93 4.76c-6.25-6.25-16.38-6.25-22.62 0L36.69 27.38c-6.24 6.25-6.24 16.38 0 22.62l86.19 86.18-94.76 94.76c-37.49 37.48-37.49 98.26 0 135.75l117.19 117.19c18.74 18.74 43.31 28.12 67.87 28.12 24.57 0 49.13-9.37 67.87-28.12l221.57-221.57c12.5-12.5 12.5-32.75.01-45.25z"/></svg>
        </div>
        <div class="cs" id="btnEyedrop">
          <svg viewBox="0 0 512 512" fill="currentColor"><path d="M341.6 29.2L240.1 130.8l-9.4-9.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-9.4-9.4L482.8 170.4c39-39 39-102.2 0-141.1s-102.2-39-141.1 0zM55.4 323.3c-15 15-23.4 35.4-23.4 56.6v42.4L5.4 462.2c-8.5 12.7-6.8 29.6 4 40.4s27.7 12.5 40.4 4L89.7 480h42.4c21.2 0 41.6-8.4 56.6-23.4L309.4 335.9l-45.3-45.3L143.4 411.3c-3 3-7.1 4.7-11.3 4.7H96V379.9c0-4.2 1.7-8.3 4.7-11.3L221.4 247.9l-45.3-45.3L55.4 323.3z"/></svg>
        </div>
        <div id="colorBall"><div id="colorInner"></div></div>
      </div>
      <!-- Row 2: Undo Redo Clear Layers SizeBall -->
      <div class="ctrl-row">
        <div class="cs" id="btnUndo">
          <svg viewBox="0 0 512 512" fill="currentColor"><path d="M255.545 8c-66.269.119-126.438 26.233-170.86 68.685L48.971 40.971C33.851 25.851 8 36.559 8 57.941V192c0 13.255 10.745 24 24 24h134.059c21.382 0 32.09-25.851 16.971-40.971l-41.75-41.75c30.864-28.899 70.801-44.907 113.23-45.273 92.398-.798 170.283 73.977 169.484 169.442C423.236 348.009 349.816 424 256 424c-41.127 0-79.997-14.678-110.629-41.556-4.743-4.161-11.906-3.908-16.368.553L89.34 422.659c-4.872 4.872-4.631 12.815.482 17.433C133.798 479.813 192.074 504 256 504c136.966 0 247.999-111.033 248-247.998C504.001 119.193 392.354 7.755 255.545 8z"/></svg>
        </div>
        <div class="cs" id="btnRedo">

<script>
// ─────────────────────────────────────────────
//  BRUSHES (from 3_brush_list panels)
// ─────────────────────────────────────────────
const BRUSHES = ['Marker','Pixel Brush','Shapes','Airbrush','Dry brush','Wet brush',
  'Velvet Pastel','Soft Watercolor','Flowing Watercolor','Flat brush',
  'Quill','Ink','Pencil','Watercolor (texture)','Rembrandt',
  'Dashed','Outline','Neon','Particles','Glyph','Test'];

// Swatches — 2 cols × 5 rows from debug (x=750,790 y=466-626)
const SWATCHES_COL1 = [
  'rgb(0,0,0)','rgb(248,248,248)','rgb(108,43,43)','rgb(14,14,14)','rgb(27,27,27)'
];
const SWATCHES_COL2 = [
  'rgb(255,255,255)','rgb(218,75,75)','rgb(226,113,113)','rgb(246,169,169)','rgb(46,46,46)'
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let currentColor = '#0000ff';
let currentHue = 240, currentS = 1, currentV = 1, currentA = 1;
let currentSize = 10;
let currentBrush = 'Marker';
let currentTool = 'brush';
let strokes = [], drawing = false, pts = [];
let savedColors = [];

// ─────────────────────────────────────────────
//  CANVAS & LAYOUT
// ─────────────────────────────────────────────
const mainC = document.getElementById('mainCanvas');
const tempC = document.getElementById('tempCanvas');
const mc = mainC.getContext('2d');
const tc = tempC.getContext('2d');
const CTRL_H = 160, TOP_H = 38;
let CW, CH, canvasTop, canvasLeft;

function layout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const avH = vh - TOP_H - CTRL_H;
  const ratio = 1016 / 1200;
  let cw = vw - 10, ch = cw / ratio;
  if (ch > avH) { ch = avH; cw = ch * ratio; }
  cw = Math.floor(cw); ch = Math.floor(ch);
  CW = cw; CH = ch;
  canvasTop = TOP_H + Math.floor((avH - ch) / 2);
  canvasLeft = Math.floor((vw - cw) / 2);

  const pos = document.getElementById('canvas-pos');
  pos.style.cssText = `top:${canvasTop}px;width:${cw}px;height:${ch}px`;
  mainC.style.cssText = tempC.style.cssText = `width:${cw}px;height:${ch}px`;
  mainC.width = tempC.width = 1016;
  mainC.height = tempC.height = 1200;

  document.getElementById('controls').style.cssText =
    `top:${canvasTop + ch + 4}px;left:0;right:0`;

  // Position width slider to left of canvas
  const slWrap = document.getElementById('widthSliderWrap');
  slWrap.style.cssText = `top:${canvasTop + Math.floor((ch-177)/2)}px;left:${Math.max(2,canvasLeft-30)}px;width:25px;height:177px`;

  // Position color palette to right side of canvas
  const pal = document.getElementById('colorPalette');
  pal.style.cssText = `top:${canvasTop + Math.floor(ch*0.3)}px;left:${canvasLeft + cw - 220}px`;

  // Position layer menu vertically centered on canvas
  const lm = document.getElementById('layerMenu');
  lm.style.top = `${canvasTop + Math.floor(ch * 0.4)}px`;

  // Position word menu — right-center area
  const wm = document.getElementById('wordMenu');
  const wmW = Math.min(270, vw - 20);
  wm.style.cssText = `top:${canvasTop + Math.floor(ch*0.2)}px;left:${canvasLeft + Math.floor(cw*0.38)}px;width:${wmW}px;max-height:${vh - canvasTop - 20}px;overflow-y:auto`;

  redraw();
  updateSizeBall();
}
window.addEventListener('resize', layout);

// ─────────────────────────────────────────────
//  DRAWING
// ─────────────────────────────────────────────
function n2c(nx, ny) {
  return { x: nx / 1000 * 1016, y: ny / 1000 * 1200 };
}
function strokeDraw(ctx, s) {
  if (!s.points || s.points.length < 2) return;
  ctx.beginPath();
  ctx.strokeStyle = s.color;
  ctx.lineWidth = s.size * 1.2;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const p0 = n2c(s.points[0].x, s.points[0].y);
  ctx.moveTo(p0.x, p0.y);
  for (let i = 1; i < s.points.length; i++) {
    const p = n2c(s.points[i].x, s.points[i].y);
    ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
}
function redraw() {
  mc.fillStyle = '#fff'; mc.fillRect(0, 0, 1016, 1200);
  strokes.forEach(s => strokeDraw(mc, s));
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
function getCoord(e) {
  const r = tempC.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: Math.round((src.clientX - r.left) / r.width * 1000),
    y: Math.round((src.clientY - r.top) / r.height * 1000)
  };
}

tempC.addEventListener('mousedown', onDown);
tempC.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
tempC.addEventListener('mousemove', onMove);
tempC.addEventListener('touchmove', e => { e.preventDefault(); onMove(e); }, { passive: false });
tempC.addEventListener('mouseup', onUp);
tempC.addEventListener('touchend', onUp);
document.addEventListener('mouseup', () => { if (drawing) onUp(); });

function onDown(e) {
  closeAll();
  if (currentTool === 'fill') {
    const c = getCoord(e);
    sendWS({ type: 'fill', x: c.x, y: c.y });
    toast('🪣 Fill');
    return;
  }
  drawing = true;
  pts = [getCoord(e)];
}
function onMove(e) {
  if (!drawing) return;
  pts.push(getCoord(e));
  tc.clearRect(0, 0, 1016, 1200);
  strokeDraw(tc, { color: currentColor, size: currentSize, points: pts });
}
function onUp() {
  if (!drawing) return;
  drawing = false;
  if (pts.length < 2) { pts = []; return; }
  const s = { color: currentColor, size: currentSize, points: pts };
  strokes.push(s);
  tc.clearRect(0, 0, 1016, 1200);
  strokeDraw(mc, s);
  sendWS({ type: 'user_stroke', ...s });
  pts = [];
}

// ─────────────────────────────────────────────
//  WEBSOCKET
// ─────────────────────────────────────────────
let ws, rTimer;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => toast('🟢 Connected');
  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    if (m.type === 'stroke_end') {
      const s = { color: m.color, size: m.size, points: m.points };
      strokes.push(s); strokeDraw(mc, s);
    }
    if (m.type === 'clear') { strokes = []; redraw(); toast('🗑 Cleared'); }
    if (m.type === 'color') applyColor(m.hex, false);
    if (m.type === 'size') applySize(m.px, false);
    if (m.type === 'undo') { strokes = m.strokes || []; redraw(); toast('↩ Undone'); }
    if (m.type === 'word') setWord(m.word);
  };
  ws.onclose = () => {
    toast('🔴 Reconnecting...');
    clearTimeout(rTimer);
    rTimer = setTimeout(connect, 3000);
  };
}
function sendWS(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

// ─────────────────────────────────────────────
//  TOOL / COLOR / SIZE
// ─────────────────────────────────────────────
function setTool(t) {
  currentTool = t;
  document.querySelectorAll('.cs').forEach(b => b.classList.remove('active'));
  const map = { brush: 'btnBrush', eraser: 'btnEraser', fill: 'btnFill', eyedrop: 'btnEyedrop' };
  if (map[t]) document.getElementById(map[t])?.classList.add('active');
}

function applyColor(hex, send = true) {
  currentColor = hex;
  document.getElementById('colorInner').style.background = hex;
  document.getElementById('hexInput').value = hex;
  updateSizeBall();
  if (send) sendWS({ type: 'color', hex });
}

function applySize(px, send = true) {
  currentSize = px;
  document.getElementById('widthSlider').value = px;
  document.getElementById('brushInfo').innerHTML = px + 'px<br>100%';
  updateSizeBall();
  if (send) sendWS({ type: 'size', px });
}

function updateSizeBall() {
  const d = Math.max(12, Math.min(38, currentSize * 0.38));
  const inner = document.getElementById('sizeInner');
  inner.style.cssText = `width:${d}px;height:${d}px;background:${currentColor}`;
  document.getElementById('sizeLbl').textContent = 'x' + (currentSize / 10).toFixed(1);
  document.getElementById('sizeLbl').style.fontSize = Math.max(7, d * 0.28) + 'px';
}

// ─────────────────────────────────────────────
//  WORD
// ─────────────────────────────────────────────
let currentWord = 'word';
function setWord(w) {
  currentWord = w;
  document.getElementById('word').textContent = w + ' ⚙️';
  document.getElementById('wordMenuTitle').textContent = w + ' ⚙️';
  buildHints(w);
}
function buildHints(w) {
  const letters = w.replace(/\s+/g, '').toUpperCase().split('');
  const r1 = document.getElementById('hintsRow1');
  const r2 = document.getElementById('hintsRow2');
  r1.innerHTML = ''; r2.innerHTML = '';
  const half = Math.ceil(letters.length / 2);
  letters.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'hint-btn'; btn.textContent = l;
    btn.addEventListener('click', () => {
      btn.classList.add('active');
      sendWS({ type: 'hint', index: i });
    });
    (i < half ? r1 : r2).appendChild(btn);
  });
}

// ─────────────────────────────────────────────
//  PANEL OPEN/CLOSE
// ─────────────────────────────────────────────
function closeAll() {
  document.getElementById('brushOverlay').classList.remove('show');
  document.getElementById('layerMenu').classList.remove('show');
  document.getElementById('wordMenu').classList.remove('show');
  document.getElementById('colorPalette').classList.remove('show');
  document.getElementById('widthSliderWrap').classList.remove('show');
  document.getElementById('clearDialog').classList.remove('show');
  // deactivate colorBall highlight
  document.getElementById('colorBall').style.borderColor = '#cc905c';
}

function openColor() {
  closeAll();
  document.getElementById('colorPalette').classList.add('show');
  document.getElementById('widthSliderWrap').classList.add('show');
  renderHSV();
}
function openBrush() { closeAll(); document.getElementById('brushOverlay').classList.add('show'); }
function openLayers() { closeAll(); document.getElementById('layerMenu').classList.add('show'); }
function openWord() { closeAll(); document.getElementById('wordMenu').classList.add('show'); }

// ─────────────────────────────────────────────
//  BUTTON WIRING
// ─────────────────────────────────────────────
document.getElementById('btnBrush').addEventListener('click', () => {
  currentTool === 'brush' ? openBrush() : setTool('brush');
});
document.getElementById('btnEraser').addEventListener('click', () => {
  if (currentTool === 'eraser') openBrush();
  else { setTool('eraser'); sendWS({ type: 'brush', name: 'Eraser' }); toast('🧹 Eraser'); }
});
document.getElementById('btnFill').addEventListener('click', () => {
  setTool(currentTool === 'fill' ? 'brush' : 'fill');
  toast(currentTool === 'fill' ? '🪣 Fill mode' : '🖌 Brush');
});
document.getElementById('btnEyedrop').addEventListener('click', () => {
  setTool('eyedrop'); toast('💉 Eyedropper');
});
document.getElementById('colorBall').addEventListener('click', openColor);
document.getElementById('btnUndo').addEventListener('click', () => { sendWS({ type: 'undo' }); toast('↩ Undo'); });
document.getElementById('btnRedo').addEventListener('click', () => { sendWS({ type: 'redo' }); toast('↪ Redo'); });
document.getElementById('btnClear').addEventListener('click', () => {
  closeAll();
  document.getElementById('clearDialog').classList.add('show');
});
document.getElementById('btnLayers').addEventListener('click', openLayers);
document.getElementById('sizeBall').addEventListener('click', openColor);
document.getElementById('word').addEventListener('click', openWord);
document.getElementById('confirm-btn').addEventListener('click', () => {
  sendWS({ type: 'confirm' }); toast('✅ Done!');
});

// ─────────────────────────────────────────────
//  SIZE BALL DRAG (ns-resize)
// ─────────────────────────────────────────────
let sd = false, sy0 = 0, sv0 = 0;
const sb = document.getElementById('sizeBall');
sb.addEventListener('mousedown', e => { sd = true; sy0 = e.clientY; sv0 = currentSize; e.preventDefault(); });
document.addEventListener('mousemove', e => { if (!sd) return; applySize(Math.max(1, Math.min(100, sv0 + Math.round((sy0 - e.clientY) / 2)))); });
document.addEventListener('mouseup', () => sd = false);
sb.addEventListener('touchstart', e => { sd = true; sy0 = e.touches[0].clientY; sv0 = currentSize; e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', e => { if (!sd) return; applySize(Math.max(1, Math.min(100, sv0 + Math.round((sy0 - e.touches[0].clientY) / 2)))); });
document.addEventListener('touchend', () => sd = false);

// ─────────────────────────────────────────────
//  HSV COLOR PICKER
// ─────────────────────────────────────────────
const hsvCanvas = document.getElementById('hsvCanvas');
const hsvCtx = hsvCanvas.getContext('2d');
let hsvDragging = false;

function renderHSV() {
  const W = hsvCanvas.width, H = hsvCanvas.height;
  // Draw saturation/value gradient for current hue
  const hueColor = `hsl(${currentHue},100%,50%)`;
  // White→hue horizontal
  const gradH = hsvCtx.createLinearGradient(0, 0, W, 0);
  gradH.addColorStop(0, '#fff'); gradH.addColorStop(1, hueColor);
  hsvCtx.fillStyle = gradH; hsvCtx.fillRect(0, 0, W, H);
  // Black vertical overlay
  const gradV = hsvCtx.createLinearGradient(0, 0, 0, H);
  gradV.addColorStop(0, 'rgba(0,0,0,0)'); gradV.addColorStop(1, '#000');
  hsvCtx.fillStyle = gradV; hsvCtx.fillRect(0, 0, W, H);
}

function hsvToHex(h, s, v) {
  let r, g, b;
  const i = Math.floor(h / 60) % 6;
  const f = h / 60 - Math.floor(h / 60);
  const p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
  [r, g, b] = [[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i];
  return '#' + [r,g,b].map(x => Math.round(x*255).toString(16).padStart(2,'0')).join('');
}

hsvCanvas.addEventListener('mousedown', e => { hsvDragging = true; updateHSV(e); });
hsvCanvas.addEventListener('mousemove', e => { if (hsvDragging) updateHSV(e); });
document.addEventListener('mouseup', () => hsvDragging = false);
hsvCanvas.addEventListener('touchstart', e => { hsvDragging = true; updateHSV(e.touches[0]); }, { passive: true });
hsvCanvas.addEventListener('touchmove', e => { if (hsvDragging) updateHSV(e.touches[0]); }, { passive: true });

function updateHSV(e) {
  const r = hsvCanvas.getBoundingClientRect();
  const sx = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  const sy = Math.max(0, Math.min(1, (e.clientY - r.top) / r.height));
  currentS = sx; currentV = 1 - sy;
  const hex = hsvToHex(currentHue, currentS, currentV);
  applyColor(hex);
}

// Hue strip
const hueStrip = document.getElementById('hueStrip');
let hueDrag = false;
hueStrip.addEventListener('mousedown', e => { hueDrag = true; updateHue(e); });
document.addEventListener('mousemove', e => { if (hueDrag) updateHue(e); });
document.addEventListener('mouseup', () => hueDrag = false);
hueStrip.addEventListener('touchstart', e => { hueDrag = true; updateHue(e.touches[0]); }, { passive: true });
hueStrip.addEventListener('touchmove', e => { if (hueDrag) updateHue(e.touches[0]); }, { passive: true });

function updateHue(e) {
  const r = hueStrip.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  currentHue = Math.round(pct * 360);
  document.getElementById('huePtr').style.left = (pct * 100) + '%';
  renderHSV();
  applyColor(hsvToHex(currentHue, currentS, currentV));
}

// Hex input
document.getElementById('hexInput').addEventListener('change', e => {
  let v = e.target.value.trim();
  if (!v.startsWith('#')) v = '#' + v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) applyColor(v);
});
document.getElementById('hexInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { let v = e.target.value.trim(); if (!v.startsWith('#')) v='#'+v; applyColor(v); }
});

// Width slider (vertical)
document.getElementById('widthSlider').addEventListener('input', e => applySize(+e.target.value));

// Build swatch columns
[SWATCHES_COL1, SWATCHES_COL2].forEach((col, ci) => {
  const el = document.getElementById(ci === 0 ? 'swCol1' : 'swCol2');
  col.forEach(c => {
    const d = document.createElement('div');
    d.className = 'sw'; d.style.background = c;
    if (c === 'rgb(255,255,255)' || c === 'rgb(248,248,248)') d.style.border = '2px solid var(--hint)';
    d.addEventListener('click', () => { applyColor(c); closeAll(); });
    el.appendChild(d);
  });
});

// Add saved color
document.getElementById('addSaved').addEventListener('click', () => {
  if (savedColors.includes(currentColor)) return;
  savedColors.push(currentColor);
  const d = document.createElement('div');
  d.className = 'saved-dot'; d.style.background = currentColor;
  const c = currentColor;
  d.addEventListener('click', () => { applyColor(c); closeAll(); });
  const row = document.getElementById('savedRow');
  row.insertBefore(d, document.getElementById('addSaved'));
});

// Alpha strip (basic)
const alphaStrip = document.getElementById('alphaStrip');
alphaStrip.style.background = `linear-gradient(to right,transparent,${currentColor})`;

// ─────────────────────────────────────────────
//  BRUSH LIST
// ─────────────────────────────────────────────
const brushScroll = document.getElementById('brushListScroll');
BRUSHES.forEach(b => {
  const row = document.createElement('div');
  row.className = 'brow' + (b === currentBrush ? ' active' : '');
  row.innerHTML = `<div class="brow-icon"><svg width="22" height="22" viewBox="0 0 512 512" fill="currentColor"><path d="M481 31C445.1-4.8 386.9-4.8 351 31l-15 15L322.9 33C294.8 4.9 249.2 4.9 221.1 33L135 119c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0L255 66.9c9.4-9.4 24.6-9.4 33.9 0L302.1 80 186.3 195.7 316.3 325.7 481 161c35.9-35.9 35.9-94.1 0-129.9z"/></svg></div><span class="brow-name">${b}</span><span class="brow-drag">☰</span>`;
  row.addEventListener('click', () => {
    currentBrush = b;
    brushScroll.querySelectorAll('.brow').forEach(r => r.classList.remove('active'));
    row.classList.add('active');
    sendWS({ type: 'brush', name: b });
    toast('🖌 ' + b);
    closeAll();
  });
  brushScroll.appendChild(row);
});
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
document.getElementById('brushBack').addEventListener('click', closeAll);
document.getElementById('brushClose').addEventListener('click', closeAll);

// ─────────────────────────────────────────────
//  LAYERS
// ─────────────────────────────────────────────
document.getElementById('layerAdd').addEventListener('click', () => { sendWS({ type: 'layer_add' }); toast('➕ Layer added'); });
document.getElementById('layerDel').addEventListener('click', () => { sendWS({ type: 'layer_del' }); toast('🗑 Layer deleted'); });
document.getElementById('transformCb').addEventListener('change', e => {
  sendWS({ type: 'layer_transform', val: e.target.checked });
});
document.getElementById('bgColorItem').addEventListener('click', () => {
  openColor();
  toast('Pick background color');
});

// Close layer menu when clicking outside
document.addEventListener('click', e => {
  const lm = document.getElementById('layerMenu');
  const lb = document.getElementById('btnLayers');
  if (!lm.contains(e.target) && !lb.contains(e.target)) lm.classList.remove('show');
});

// ─────────────────────────────────────────────
//  WORD MENU
// ─────────────────────────────────────────────
document.getElementById('wordMenuClose').addEventListener('click', closeAll);
document.getElementById('changeWord').addEventListener('click', () => {
  sendWS({ type: 'change_word' }); toast('🔄 Changing...'); closeAll();
});

// ─────────────────────────────────────────────
//  CLEAR DIALOG
// ─────────────────────────────────────────────
document.getElementById('clearCancel').addEventListener('click', closeAll);
document.getElementById('clearOk').addEventListener('click', () => {
  strokes = []; redraw(); sendWS({ type: 'clear' }); toast('🗑 Cleared'); closeAll();
});

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
layout();
applyColor('#0000ff', false);
applySize(10, false);
setWord('word');
connect();
</script>
